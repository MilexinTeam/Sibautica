name: Build and Release

on:
  push:
    branches:
      - "**"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run download.js
        run: node ./other/download.js

      - name: Prepare ZIP content
        run: |
          mkdir release_root

          # skopiuj CAŁE repo (bez .git)
          rsync -av --exclude='.git' ./ release_root/

          # skopiuj wygenerowane pliki (jeśli istnieją)
          [ -d "./output" ] && rsync -av ./output/ release_root/output/
          [ -d "./other/output" ] && rsync -av ./other/output/ release_root/other_output/
          [ -d "./dist" ] && rsync -av ./dist/ release_root/dist/

      - name: Create ZIP
        run: |
          cd release_root
          zip -r ../release.zip .

      - name: Create tag name
        id: tag
        run: echo "tag=build-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ github.event.head_commit.message }}
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
